{% extends "base.html" %}
{% block title %}Register | {{ config.CLINIC_NAME }}{% endblock %}
{% block content %}
<section class="section-pad" style="min-height:80vh;display:flex;align-items:center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6" data-aos="zoom-in">
        <div class="card-premium p-5">
          <div class="text-center mb-4">
            <div class="brand-icon mx-auto mb-3" style="width:54px;height:54px;font-size:22px;">
              <i class="fas fa-heartbeat"></i>
            </div>
            <h3 class="mb-1">Create Account</h3>
            <p class="text-muted" style="font-size:14px;">Join thousands of patients on their recovery journey</p>
          </div>
          <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-floating-custom form-label">First Name *</label>
                <input type="text" name="first_name" class="form-control-custom" placeholder="John" required>
              </div>
              <div class="col-6">
                <label class="form-floating-custom form-label">Last Name *</label>
                <input type="text" name="last_name" class="form-control-custom" placeholder="Smith" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-floating-custom form-label">Email Address *</label>
              <input type="email" name="email" class="form-control-custom" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
              <label class="form-floating-custom form-label">Phone Number</label>
              <input type="tel" name="phone" class="form-control-custom" placeholder="+1 555 000 0000">
            </div>
            <div class="row g-3 mb-4">
              <div class="col-6">
                <label class="form-floating-custom form-label">Password *</label>
                <input type="password" name="password" class="form-control-custom" placeholder="••••••••" required minlength="6">
              </div>
              <div class="col-6">
                <label class="form-floating-custom form-label">Confirm Password *</label>
                <input type="password" name="confirm_password" class="form-control-custom" placeholder="••••••••" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
          </form>
          <div class="divider mt-4"></div>
          <div class="text-center">
            <p style="font-size:14px;" class="text-muted">Already have an account?
              <a href="{{ url_for('auth.login') }}" class="fw-600">Sign in here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
