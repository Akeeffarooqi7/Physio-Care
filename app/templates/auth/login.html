{% extends "base.html" %}
{% block title %}Login | {{ config.CLINIC_NAME }}{% endblock %}
{% block content %}
<section class="section-pad" style="min-height:80vh;display:flex;align-items:center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5" data-aos="zoom-in">
        <div class="card-premium p-5">
          <div class="text-center mb-4">
            <div class="brand-icon mx-auto mb-3" style="width:54px;height:54px;font-size:22px;">
              <i class="fas fa-heartbeat"></i>
            </div>
            <h3 class="mb-1">Welcome Back</h3>
            <p class="text-muted" style="font-size:14px;">Sign in to your account</p>
          </div>

          <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
              <label class="form-floating-custom form-label">Email Address</label>
              <input type="email" name="email" class="form-control-custom" placeholder="you@example.com" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-floating-custom form-label">Password</label>
              <input type="password" name="password" class="form-control-custom" placeholder="••••••••" required>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <label class="d-flex align-items-center gap-2 cursor-pointer" style="font-size:14px;">
                <input type="checkbox" name="remember"> Remember me
              </label>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
          </form>

          <div class="divider mt-4"></div>
          <div class="text-center">
            <p style="font-size:14px;" class="text-muted">Don't have an account?
              <a href="{{ url_for('auth.register') }}" class="fw-600">Register here</a>
            </p>
          </div>

          <!-- Demo credentials -->
          <div class="mt-3 p-3 rounded" style="background:var(--bg-secondary);font-size:12.5px;">
            <p style="color:var(--text-muted);margin:0;"><strong>Demo Credentials:</strong><br>
              Admin: admin@physiocare.com / admin123<br>
              Patient: patient@demo.com / patient123
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
