{% extends "base.html" %}
{% block title %}My Profile | {{ config.CLINIC_NAME }}{% endblock %}
{% block content %}
<div style="padding-top:80px;min-height:80vh;background:var(--bg-secondary);">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card-premium p-5">
          <h4 class="mb-1">Update Profile</h4>
          <p class="text-muted mb-4" style="font-size:14px;">Keep your information up to date</p>
          <form method="POST" action="{{ url_for('auth.profile') }}">
            <div class="row g-3">
              <div class="col-6">
                <label class="form-floating-custom form-label">First Name</label>
                <input type="text" name="first_name" class="form-control-custom" value="{{ current_user.first_name or '' }}">
              </div>
              <div class="col-6">
                <label class="form-floating-custom form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control-custom" value="{{ current_user.last_name or '' }}">
              </div>
              <div class="col-12">
                <label class="form-floating-custom form-label">Phone</label>
                <input type="tel" name="phone" class="form-control-custom" value="{{ current_user.phone or '' }}">
              </div>
              <div class="col-12">
                <label class="form-floating-custom form-label">Address</label>
                <input type="text" name="address" class="form-control-custom" value="{{ current_user.address or '' }}">
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary w-100">
                  <i class="fas fa-save me-2"></i>Save Changes
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
